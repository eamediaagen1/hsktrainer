kind = "web"
previewPath = "/"
title = "HSK Vocabulary Trainer"
version = "1.0.0"
id = "artifacts/hsk-trainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18909

[services.development]
run = "pnpm --filter @workspace/hsk-trainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hsk-trainer", "run", "build" ]
publicDir = "artifacts/hsk-trainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18909"
BASE_PATH = "/"
